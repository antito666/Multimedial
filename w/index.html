<!DOCTYPE html>
<!-- Indica al navegador que este documento usa HTML5 -->

<html lang="es">  
<!-- Inicio del documento HTML -->

<head>
<!-- Sección donde van metadatos, título y estilos -->

<meta charset="UTF-8">
<!-- Define la codificación de caracteres para que se vean bien tildes y símbolos -->

<title>santo.art | Galería</title>
<!-- Título de la página que aparece en la pestaña del navegador -->

<style>
/* Aquí comienza la sección de estilos CSS que define la apariencia visual */      
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

/* Estilo general del cuerpo */

        body {
            font-family: 'times new roman';
            background-color: #ffffff;
            color: #1a1a1a;
            line-height: 3.6;
            display: flex;
            flex-direction: column;
            align-items: center;
        }


       /* Contenedor principal */
        .contenedor {
            width: 100%;
            padding: 60px 40px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 200;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 1%;
            text-align: center;
        }

        /* Navegación Minimalista */
        nav {
            margin-bottom: 50px;
        }

        nav a {
            text-decoration: none;
            color: #888;
            font-size: 0.85rem;
            margin: 0 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.4s ease;
        }

        nav a:hover {
            color: #000;
        }

        /* Contenedor de Obra Principal */
        .hero-art {
            width: 90%;
            max-width: 600px;
            margin-bottom: 80px;
            overflow: hidden;
        }

        .hero-art img {
            width: 100%;
            height: auto;
            display: block;
            filter: grayscale(20%); /* Toque artístico */
            transition: filter 0.5s ease;
        }

        .hero-art img:hover {
            filter: grayscale(0%);
        }

        /* Pie de página sutil */
        footer {
            padding: 40px;
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: #bbb;
            text-transform: uppercase;
        }

        /* Ajuste para móviles */
        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            nav a { display: block; margin: 10px 0; }
        }
    </style>
</head>
<body>

    <header>
        <h1>SANTO</h1>
    </header>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="obras.html">Obras</a>
        <a href="contacto.html">Contacto</a>
    </nav>

    <main class="hero-art">
        <img src="img/5.jpg" alt="Obra de Santo">
    </main>

    <footer>
        &copy; 2026 SANTO ART.
    </footer>

</body>
</html>
